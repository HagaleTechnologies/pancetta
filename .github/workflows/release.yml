name: Release

on:
  push:
    tags:
      - 'v[0-9]+.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # Create GitHub Release
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Generate changelog
        id: changelog
        run: |
          # Extract changelog for this version
          echo "Generating changelog for version ${{ steps.get_version.outputs.version }}"
          # This is a placeholder - implement actual changelog extraction
          echo "changelog=See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details." >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          release_name: Pancetta ${{ steps.get_version.outputs.version }}
          body: |
            ## Pancetta ${{ steps.get_version.outputs.version }}
            
            Real-time audio processing framework with ultra-low latency.
            
            ### Changes
            ${{ steps.changelog.outputs.changelog }}
            
            ### Installation
            
            #### Cargo
            ```bash
            cargo install pancetta
            ```
            
            #### Download Binary
            Download the appropriate binary for your platform from the assets below.
            
            ### Supported Platforms
            - Linux (x86_64, aarch64, armv7, arm)
            - macOS (x86_64, Apple Silicon)
            - Windows (x86_64)
            - Raspberry Pi (32-bit and 64-bit)
            
            ### Checksums
            SHA256 checksums are provided for all binaries in `checksums.txt`.
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.version, '-') }}

  # Build and upload release binaries
  build-release:
    name: Build Release - ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native builds
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ""
            archive: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            suffix: ""
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: ""
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: ""
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: ".exe"
            archive: zip
          
          # Raspberry Pi builds
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            suffix: ""
            archive: tar.gz
            use_cross: true
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            suffix: ""
            archive: tar.gz
            use_cross: true
          - os: ubuntu-latest
            target: arm-unknown-linux-gnueabihf
            suffix: ""
            archive: tar.gz
            use_cross: true

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tool
        if: matrix.use_cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install system dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest' && matrix.use_cross != true
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libssl-dev pkg-config
          if [[ "${{ matrix.target }}" == *"musl"* ]]; then
            sudo apt-get install -y musl-tools
          fi

      - name: Install system dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install portaudio pkg-config

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-release-

      - name: Build release binary with cargo
        if: matrix.use_cross != true
        run: |
          cargo build --release --target ${{ matrix.target }} --all-features
          echo "BINARY_PATH=target/${{ matrix.target }}/release/pancetta${{ matrix.suffix }}" >> $GITHUB_ENV

      - name: Build release binary with cross
        if: matrix.use_cross == true
        run: |
          cross build --release --target ${{ matrix.target }} --all-features
          echo "BINARY_PATH=target/${{ matrix.target }}/release/pancetta${{ matrix.suffix }}" >> $GITHUB_ENV

      - name: Strip binary (Linux/macOS)
        if: matrix.os != 'windows-latest' && matrix.use_cross != true
        run: strip ${{ env.BINARY_PATH }}

      - name: Create release archive
        id: create_archive
        shell: bash
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          ARCHIVE_NAME="pancetta-${VERSION}-${{ matrix.target }}"
          
          mkdir -p release
          cp ${{ env.BINARY_PATH }} release/
          cp README.md LICENSE release/ || true
          
          if [ "${{ matrix.archive }}" = "zip" ]; then
            cd release && 7z a "../${ARCHIVE_NAME}.zip" * && cd ..
            echo "archive_path=${ARCHIVE_NAME}.zip" >> $GITHUB_OUTPUT
            echo "content_type=application/zip" >> $GITHUB_OUTPUT
          else
            cd release && tar czf "../${ARCHIVE_NAME}.tar.gz" * && cd ..
            echo "archive_path=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_OUTPUT
            echo "content_type=application/gzip" >> $GITHUB_OUTPUT
          fi
          
          # Generate checksum
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            shasum -a 256 "${ARCHIVE_NAME}".* > "${ARCHIVE_NAME}.sha256"
          else
            sha256sum "${ARCHIVE_NAME}".* > "${ARCHIVE_NAME}.sha256"
          fi
          echo "checksum_path=${ARCHIVE_NAME}.sha256" >> $GITHUB_OUTPUT

      - name: Upload release archive
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ steps.create_archive.outputs.archive_path }}
          asset_name: ${{ steps.create_archive.outputs.archive_path }}
          asset_content_type: ${{ steps.create_archive.outputs.content_type }}

      - name: Upload checksum
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ steps.create_archive.outputs.checksum_path }}
          asset_name: ${{ steps.create_archive.outputs.checksum_path }}
          asset_content_type: text/plain

  # Publish to crates.io
  publish-crate:
    name: Publish to crates.io
    needs: [create-release, build-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libssl-dev pkg-config

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-publish-

      - name: Verify version matches tag
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          CARGO_VERSION="v$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)"
          if [ "${VERSION}" != "${CARGO_VERSION}" ]; then
            echo "Error: Tag version ${VERSION} doesn't match Cargo.toml version ${CARGO_VERSION}"
            exit 1
          fi

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish --all-features --dry-run
          cargo publish --all-features
        continue-on-error: true  # Don't fail if package is already published

  # Build and publish Docker images
  docker:
    name: Docker Images
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        continue-on-error: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
            ${{ secrets.DOCKER_USERNAME }}/pancetta
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Generate and upload release notes
  release-notes:
    name: Update Release Notes
    needs: [create-release, build-release, publish-crate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate detailed release notes
        id: release_notes
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          
          # Get commit messages since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 ${VERSION}^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log ${PREV_TAG}..${VERSION} --pretty=format:"- %s (%h)" --no-merges)
          else
            COMMITS=$(git log ${VERSION} --pretty=format:"- %s (%h)" --no-merges)
          fi
          
          # Count different types of changes
          FEATURES=$(echo "$COMMITS" | grep -i "feat\|feature\|add" | wc -l)
          FIXES=$(echo "$COMMITS" | grep -i "fix\|bug" | wc -l)
          DOCS=$(echo "$COMMITS" | grep -i "doc" | wc -l)
          
          echo "Generated release notes with $FEATURES features, $FIXES fixes, and $DOCS doc updates"

  # Final success check
  release-success:
    name: Release Success
    if: ${{ success() }}
    needs:
      - create-release
      - build-release
      - publish-crate
      - docker
      - release-notes
    runs-on: ubuntu-latest
    steps:
      - name: Release completed
        run: |
          echo "Release ${{ needs.create-release.outputs.version }} completed successfully!"
          echo "Download binaries from: https://github.com/${{ github.repository }}/releases/tag/${{ needs.create-release.outputs.version }}"
          echo "Crate available at: https://crates.io/crates/pancetta"
          echo "Docker image: ghcr.io/${{ github.repository }}:${{ needs.create-release.outputs.version }}"