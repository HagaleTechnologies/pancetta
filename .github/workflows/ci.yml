name: CI

on:
  push:
    branches: [main]
    paths:
      - '**/*.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/*.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.github/workflows/ci.yml'

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fast checks — run on every push and PR (~2 min)
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev libssl-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          key: clippy

      - name: Clippy (workspace)
        run: cargo clippy --workspace --features transmit

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  # Full test suite — runs on every push to main and every PR. Previously
  # gated on `pull_request` only, which let test regressions land via direct
  # push without ever being exercised. Cross-platform-check stays on PR only
  # because it's the slowest lane.
  ft8-tests:
    name: FT8 Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ft8-tests

      - name: Check (no features)
        run: cargo check -p pancetta-ft8

      - name: Check (transmit feature)
        run: cargo check --features transmit -p pancetta-ft8

      - name: Run FT8 tests (all features)
        run: cargo test --features transmit -p pancetta-ft8

  workspace-check:
    name: Workspace Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev libssl-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: workspace-check

      - name: Check workspace
        run: cargo check --workspace

      - name: Build examples
        run: cargo build --workspace --examples

      - name: Test workspace
        run: cargo test --workspace --features transmit

      # pancetta-hamlib is excluded from the default workspace test run
      # because tokio runtime conflicts cause the suite to hang; needs
      # --test-threads=1 in its own invocation.
      - name: Test pancetta-hamlib (single-threaded)
        run: cargo test -p pancetta-hamlib --lib -- --test-threads=1

  # Cross-platform compile check. Pancetta targets Linux/macOS/Windows
  # (development on Mac, production on Windows MiniPC), so a Linux-only
  # CI lane silently lets platform regressions land. Check-only (not test)
  # to keep wall-clock manageable.
  cross-platform-check:
    name: Cross-Platform Check (${{ matrix.os }})
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: cross-${{ matrix.os }}

      # default-members excludes pancetta-hamlib; the rigctld TCP path is
      # exercised on Linux and the bundled FFI bindings are dead code. The
      # other crates must compile on all three platforms.
      - name: Check workspace (default members)
        run: cargo check

  # cargo-deny enforces license whitelist, banned-crate-source policy,
  # multi-version warnings, AND RustSec advisories — the latter subsumes
  # what cargo-audit would do separately. Single source of truth in
  # deny.toml, including any documented advisory ignores.
  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check bans licenses sources advisories
