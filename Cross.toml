# Cross-compilation configuration for Pancetta
# Used by the cross tool for building for different architectures

[build]
# Use pre-built Docker images for faster builds
pre-build = []

[target.aarch64-unknown-linux-gnu]
# 64-bit ARM Linux (Raspberry Pi 4, AWS Graviton, etc.)
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:latest"
pre-build = [
    "dpkg --add-architecture arm64",
    "apt-get update",
    "apt-get install -y libasound2-dev:arm64 libssl-dev:arm64 pkg-config",
]

[target.aarch64-unknown-linux-musl]
# 64-bit ARM Linux with musl (Alpine Linux on ARM64)
image = "ghcr.io/cross-rs/aarch64-unknown-linux-musl:latest"

[target.armv7-unknown-linux-gnueabihf]
# 32-bit ARM Linux with hardware float (Raspberry Pi 2/3)
image = "ghcr.io/cross-rs/armv7-unknown-linux-gnueabihf:latest"
pre-build = [
    "dpkg --add-architecture armhf",
    "apt-get update",
    "apt-get install -y libasound2-dev:armhf libssl-dev:armhf pkg-config",
]

[target.arm-unknown-linux-gnueabihf]
# 32-bit ARM Linux with hardware float (older Raspberry Pi)
image = "ghcr.io/cross-rs/arm-unknown-linux-gnueabihf:latest"
pre-build = [
    "dpkg --add-architecture armhf",
    "apt-get update",
    "apt-get install -y libasound2-dev:armhf libssl-dev:armhf pkg-config",
]

[target.arm-unknown-linux-musleabihf]
# 32-bit ARM Linux with musl and hardware float
image = "ghcr.io/cross-rs/arm-unknown-linux-musleabihf:latest"

[target.x86_64-unknown-linux-musl]
# x86_64 Linux with musl (Alpine Linux)
image = "ghcr.io/cross-rs/x86_64-unknown-linux-musl:latest"

[target.x86_64-pc-windows-gnu]
# Windows cross-compilation from Linux
image = "ghcr.io/cross-rs/x86_64-pc-windows-gnu:latest"

# Environment variables for all targets
[build.env]
passthrough = [
    "RUST_BACKTRACE",
    "CARGO_TERM_COLOR",
    "RUSTFLAGS",
]

# Target-specific environment variables
[target.aarch64-unknown-linux-gnu.env]
# Optimize for common ARM64 processors
RUSTFLAGS = "-C target-cpu=cortex-a72 -C link-arg=-Wl,-rpath,$ORIGIN"
PKG_CONFIG_PATH = "/usr/lib/aarch64-linux-gnu/pkgconfig"
PKG_CONFIG_ALLOW_CROSS = "1"

[target.armv7-unknown-linux-gnueabihf.env]
# Optimize for Raspberry Pi 2/3
RUSTFLAGS = "-C target-cpu=cortex-a7 -C link-arg=-Wl,-rpath,$ORIGIN"
PKG_CONFIG_PATH = "/usr/lib/arm-linux-gnueabihf/pkgconfig"
PKG_CONFIG_ALLOW_CROSS = "1"

[target.arm-unknown-linux-gnueabihf.env]
# Optimize for older Raspberry Pi
RUSTFLAGS = "-C target-cpu=arm1176jzf-s -C link-arg=-Wl,-rpath,$ORIGIN"
PKG_CONFIG_PATH = "/usr/lib/arm-linux-gnueabihf/pkgconfig"
PKG_CONFIG_ALLOW_CROSS = "1"